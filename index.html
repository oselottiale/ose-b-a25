<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="https://dev.oseale.com/css/color-ldr.css">

  <style>
    body {
      background-color: white;
      margin: 0;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
    }

    .ldr, .ldr-right {
      position: fixed;
      width: 100px;
      height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    .ldr {
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
    .ldr-right {
      bottom: 5px;
      right: 5px;
      display: none;
    }

    .hexagon, .ring {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .card, .card2 {
      display: flex;
      height: clamp(130px, 25vh, 180px);
      align-items: center;
      position: fixed;
      top: 0;
      background-color: white;
      z-index: 9999;
      border-bottom: 3px solid gray;
    }
    .card {
      width: clamp(525px, 40vw, 700px);
      right: 0;
      border-left: 3px solid gray;
      border-bottom-left-radius: 20px;
    }
    .card2 {
      width: clamp(425px, 40vw, 425px);
      left: 0;
      border-right: 3px solid gray;
      border-bottom-right-radius: 20px;
    }

    .qr {
      height: calc(100% - 20px);
      margin: 10px;
      aspect-ratio: 1/1;
      flex-shrink: 0;
      margin-right: 8px;
    }

    .text-box, .text-box2 {
      flex: 1 1 auto;
      min-width: 0;
      display: flex;
      align-items: center;
    }
    .text-box2 { margin-left: 15px; }

    .text-box h1, .text-box2 h1 {
      margin: 0;
      white-space: normal;
      line-height: 1.1;
      font-size: clamp(1rem, 400%, 2.5rem);
    }

    #message-container {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100vw;
      height: calc(100vh - 225px);
      overflow: hidden;
      padding: 20px 0;
    }

    #slide-wrapper {
      position: absolute;
      top: 0;
      left: 0;
      opacity: 0;
      white-space: nowrap;
    }

    .column {
      display: inline-block;
      gap: 40px;
      white-space: normal;
      vertical-align: top;
    }

    .column > .msg {
    display: block;          
    margin-bottom: 40px;
    }

    .msg {
      padding: 20px;
      border: 3px solid black;
      border-radius: 10px;
      background: white;
      white-space: pre-wrap;
      overflow-wrap: break-word;
      text-align: center;
      font-size: 2rem;
      color: black;
      display: block;
      width: auto;
      max-width: 45vw;
      margin-left: 40px;
    }

    #marquee-wrapper {
    display: inline-block;
    flex-direction: row;
    gap: 40px;
    white-space: nowrap;
    width: max-content;
    }
    #measure-wrapper {
      position: absolute;
      left: -99999px;
      top: 0;
      white-space: nowrap;
    }


  </style>
</head>

<body>

  <div class="card">
    <img class="qr" src="https://t6.oseale.com/qr-code.png">
    <div class="text-box">
      <h1>Skannaa qr koodi lähettääksesi viesti aiheesta!</h1>
    </div>
  </div>

  <div class="card2">
    <div class="text-box2">
      <h1>Peltsiläisten viestit rasismin vastaisesta viikosta.</h1>
    </div>
  </div>

  <div class="ldr">
    <svg class="hexagon" viewBox="0 0 50 50">
      <polygon points="10,25 17.5,12 32.5,12 40,25 32.5,38 17.5,38"></polygon>
    </svg>
    <svg class="ring" viewBox="0 0 50 50">
      <circle cx="25" cy="25" r="22"></circle>
    </svg>
  </div>

  <div id="message-container">
    <div id="slide-wrapper">
      <div id="marquee-wrapper"></div>
    </div>
  </div>

  <div class="ldr-right">
    <svg class="hexagon" viewBox="0 0 50 50">
      <polygon points="10,25 17.5,12 32.5,12 40,25 32.5,38 17.5,38"></polygon>
    </svg>
    <svg class="ring" viewBox="0 0 50 50">
      <circle cx="25" cy="25" r="22"></circle>
    </svg>
  </div>

  <div id="measure-wrapper" style="visibility:hidden; position:absolute; left:0; top:0;"></div>
  <iframe id="slideshowFrame" style="display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; border:none; z-index:5000;"></iframe>

  <script>
  var firstLoad = true;

  var slideX = 0;
  var slideSpeed = 1.2;
  var holdTime = 0;

  var slidingIn = false;
  var slidingOut = false;

  function loadMessages() {
    var bigLoader = document.querySelector(".ldr");
    var smallLoader = document.querySelector(".ldr-right");

    var slide = document.getElementById("slide-wrapper");
    var marquee = document.getElementById("marquee-wrapper");
    var container = document.getElementById("message-container");
    var measure = document.getElementById("measure-wrapper");

    if (firstLoad) bigLoader.style.display = "flex";
    else smallLoader.style.display = "flex";

    var xhr = new XMLHttpRequest();
    xhr.open("GET",
      "https://script.google.com/macros/s/AKfycbzGuAd-V1JzOXNZdT_WBQLndVp8UI_N4h3X4-D5HS5IRj-PzNIIJrAhHstGwcBL1lcrdw/exec?d=get",
      true
    );

    xhr.onreadystatechange = function () {
      if (xhr.readyState === 4) {
        if (xhr.status !== 200) return;

        var data;
        try { data = JSON.parse(xhr.responseText); }
        catch (e) { return; }

        measure.innerHTML = "";

        var currentColumn = document.createElement("div");
        currentColumn.className = "column";
        measure.appendChild(currentColumn);

        var currentHeight = 0;
        var maxHeight = container.clientHeight;

        var msgs = data.approved.slice().reverse();

        for (var i = 0; i < msgs.length; i++) {
          var msg = document.createElement("div");
          msg.className = "msg";
          msg.textContent = msgs[i][0];

          measure.appendChild(msg);
          var msgHeight = msg.offsetHeight + 40;
          measure.removeChild(msg);

          if (currentHeight + msgHeight > maxHeight) {
            currentColumn = document.createElement("div");
            currentColumn.className = "column";
            measure.appendChild(currentColumn);
            currentHeight = 0;
          }

          currentColumn.appendChild(msg);
          currentHeight += msgHeight;
        }

        measure.offsetWidth;

        var contentHeight = measure.offsetHeight;
        var contentWidth = measure.scrollWidth;

        marquee.innerHTML = measure.innerHTML;

        slide.style.height = (contentHeight + 20) + "px";
        slide.style.width = contentWidth + "px";

        slide.offsetWidth;

        var containerWidth = container.clientWidth;
        slideX = containerWidth;

        slide.style.left = slideX + "px";
        slide.style.opacity = "1";

        slidingIn = true;
        requestAnimationFrame(stepSlideIn);

        if (firstLoad) {
          bigLoader.style.display = "none";
          firstLoad = false;
        }

        smallLoader.style.display = "none";
      }
    };

    xhr.send();
  }

  function stepSlideIn() {
    var slide = document.getElementById("slide-wrapper");

    if (!slidingIn) return;

    slideX -= slideSpeed;

    if (slideX <= 0) {
      slideX = 0;
      slidingIn = false;

      setTimeout(function () {
        slidingOut = true;
        requestAnimationFrame(stepSlideOut);
      }, holdTime);

      return;
    }

    slide.style.left = slideX + "px";
    requestAnimationFrame(stepSlideIn);
  }

  function stepSlideOut() {
    var slide = document.getElementById("slide-wrapper");

    if (!slidingOut) return;

    slideX -= slideSpeed;

    if (slideX <= -slide.offsetWidth - 40) {
      slidingOut = false;
      onMessageCycleComplete();
      return;
    }

    slide.style.left = slideX + "px";
    requestAnimationFrame(stepSlideOut);
  }

  loadMessages();
  </script>
  <script>

  var SLIDES_VISIBLE_TIME = 27000; 
  var MSG_CYCLES_BEFORE_SLIDES = 2;

  var slidesId = "19q6v5NqyDLkIB89l-IFuDSy2njVl7bPuESDeXtLZCCQ"; 
  var slideDelay = 7000; 
  var msgCycles = 0;
  var inSlides = false;

  var iframe = document.getElementById("slideshowFrame");
  var loader = document.querySelector(".ldr");

  var card1 = document.querySelector(".card");
  var card2 = document.querySelector(".card2");

  (function loadSlidesConfig() {
      var xhr = new XMLHttpRequest();
      xhr.open("GET",
        "https://script.google.com/macros/s/AKfycbzPCFNBl_TqMUUmJDVrYx4KRDi-rHoQqznX_Eqgdz72PfOEpIVmJ0koAB4FLQ21v8sfGg/exec",
        true
      );

      xhr.onreadystatechange = function () {
          if (xhr.readyState === 4 && xhr.status === 200) {
              try {
                  var cfg = JSON.parse(xhr.responseText);
                  if (cfg.slideshowId) slidesId = cfg.slideshowId;
                  if (cfg.slideDelay) slideDelay = cfg.slideDelay;
              } catch(e){}
          }
      };

      xhr.send();
  })();

  function buildSlidesURL() {
      return "https://docs.google.com/presentation/d/" +
          slidesId +
          "/embed?start=true&loop=true&delayms=" + slideDelay +
          "&rm=minimal&cb=" + Date.now();
  }

  function onMessageCycleComplete() {
      if (inSlides) return;

      msgCycles++;

      if (msgCycles >= MSG_CYCLES_BEFORE_SLIDES) {
          showSlidesSegment();
      } else {
          loadMessages();
      }
  }

  function showSlidesSegment() {
      inSlides = true;
      msgCycles = 0;

      card1.style.display = "none";
      card2.style.display = "none";


      loader.style.display = "flex";

      iframe.style.display = "none";

      iframe.src = buildSlidesURL();

      iframe.onload = function () {
          loader.style.display = "none";
          iframe.style.display = "block";

          setTimeout(function () {
              iframe.style.display = "none";
              card1.style.display = "flex";
              card2.style.display = "flex";
              inSlides = false;
              loadMessages();
          }, SLIDES_VISIBLE_TIME);
      };
  }
  </script>



</body>
</html>
