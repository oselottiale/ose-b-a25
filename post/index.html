<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Lähetä viesti</title>
  <style>
     body {
       font-family: Arial, sans-serif;
       margin: 0;
       padding: 0;
       overflow-x: hidden;
       display: flex;
       justify-content: center;
       align-items: center;
       min-height: 100vh;
      }
    textarea {
      resize: none;          
      overflow-y: auto;      
      overflow-x: hidden;    
      width: 100%;         
      min-height: 120px;     
      border: 4px solid gray;
      border-radius: 8px;
      font-family: Arial, Helvetica, sans-serif;
    }
    input, button {
      width: 100%;
      height: 60px;
      padding: 12px;
      background-color: white;
      color: gray;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.3s ease;
      margin-bottom: 8px;
      margin-top: 2px;
      border: 4px solid gray;
      border-radius: 8px;
    }

    button:hover {
        background-color: #f5f5f5;
    }

     .box {
        visibility: hidden; 
        width: calc(100vw - 40px);
        background: #fff;
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        text-align: center;
        max-width: 500px;
        border: 4px solid gray;
        z-index: 9999;
    }

    .footer {
        margin-top: 20px;
        font-size: 14px;
        color: #777;
    }
    #status { margin-top: 15px; }
  </style>
</head>
<body>
<div class="box" id="box">
  <img src="https://dev.oseale.com/images/oseale-logo.png" width="100px" height="100px">
  <h1>Lähetä viesti</h1>

  <textarea id="message" placeholder="Kirjoita viesti..."></textarea>
  <div id="status"></div>
  <button onclick="sendMessage()">Lähetä</button>

  
  <div class="footer">&copy <span id="year"></span> Oseale.</div>
</div>
  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyEGOD0jJF4eGtEF_m7eS6QpmsF6UYU0Fi3-QIR-vaB_abhRpGvhjWpW4FZFlbHUu44Ug/exec";

    async function sendMessage() {
      const message = encodeURIComponent(document.getElementById("message").value);
      const status = document.getElementById("status");

      if (!message) {
        status.textContent = "Kirjoita viesti ensin.";
        return;
      }

      status.textContent = "Lähetetään...";

      try {
        const res = await fetch(`${SCRIPT_URL}?d=post&message=${message}`);
        const data = await res.json();

        if (data.success) {
          status.textContent = "Viesti lähetetty tarkistettavaksi.";
          document.getElementById("message").value = "";
        } else {
          status.textContent = "Virhe lähetyksessä.";
        }
      } catch {
        status.textContent = "Virhe yhteydessä palvelimeen.";
      }
    }
  </script>
  <script>
    const yearSpan = document.getElementById('year');
    if (yearSpan) yearSpan.textContent = new Date().getFullYear();
</script>
<script>
  textarea.addEventListener("input", function () {
    this.style.height = "auto";
    this.style.height = this.scrollHeight + "px";
  });
</script>
</body>
</html>
