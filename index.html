<!doctype html>
<head>
  <link rel="stylesheet" href="https://dev.oseale.com/css/black-ldr.css">
  <style>
    body {
      background-color: white;
    }
    .ldr {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 100px;
      height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    .ldr-right {
      position: fixed;
      top: 90%;
      left: 95%;
      transform: translate(-50%, -50%);
      width: 100px;
      height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    .hexagon, .ring {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%); 
      margin: 0;
      padding: 0;
  }

  .card {
    display: flex;
    align-items: left;
    container-type: size;
    border-bottom-left-radius: 20px;
    z-index: 9990;
  position: fixed;
  top: 0;
  right: 0;
  width: 30%;
  height: 25%;
  border-left: 3px solid gray;
  border-bottom: 3px solid gray;
  margin: 0;
  padding: 0;
  z-index: 9999;
  }

  h1 {
    font-family: Arial, Helvetica, sans-sherif;
  }

  .qr {
    height: calc(100% - 20px);
    margin: 10px;
    margin-right: 3px;
  }

  .card h1 {
    flex: 1 1 auto;
    margin: 0.5rem;
    line-height: 1.05;
    white-space: normal;
  
    font-size: clamp(0.6rem, 10cqh, 3rem);
  }




  </style>
</head>
<body>
  <h1>oseale ui test</h1>
  <div class="card"><img class="qr" src="https://t6.oseale.com/qr-code.png"><h1>skannaa qr koodi lähettääksesi viesti aiheesta</h1></div>
  <div class="ldr">
      <svg class="hexagon" viewBox="0 0 50 50">
          <polygon points="10,25 17.5,12 32.5,12 40,25 32.5,38 17.5,38"></polygon>
      </svg>
      <svg class="ring" viewBox="0 0 50 50">
          <circle cx="25" cy="25" r="22"></circle>
      </svg>
  </div>
  <div class="ldr-right">
      <svg class="hexagon" viewBox="0 0 50 50">
          <polygon points="10,25 17.5,12 32.5,12 40,25 32.5,38 17.5,38"></polygon>
      </svg>
      <svg class="ring" viewBox="0 0 50 50">
          <circle cx="25" cy="25" r="22"></circle>
      </svg>
  </div>
</body>
</html>
