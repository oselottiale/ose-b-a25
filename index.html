<!doctype html>
<head>
  <link rel="stylesheet" href="https://dev.oseale.com/css/color-ldr.css">
  <style>
    body {
      background-color: white;
    }
    .ldr {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 100px;
      height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    .hexagon, .ring {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%); 
      margin: 0;
      padding: 0;
  }

  .card {
  position: fixed;
  top: 0;
  right: 0;
  width: 250px;
  height: 100px;
  border: 3px solid gray;
  margin: 0;
  padding: 0;
  z-index: 9999;
  }
  </style>
</head>
<body>
  <h1>oseale ux test</h1>
  <div class="card"><h1>kortti</h1></div>
  <div class="ldr">
      <svg class="hexagon" viewBox="0 0 50 50">
          <polygon points="10,25 17.5,12 32.5,12 40,25 32.5,38 17.5,38"></polygon>
      </svg>
      <svg class="ring" viewBox="0 0 50 50">
          <circle cx="25" cy="25" r="22"></circle>
      </svg>
  </div>
</body>
</html>
