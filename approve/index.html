<!doctype html>
<html>
<head>
    <link rel="stylesheet" href="https://dev.oseale.com/css/color-ldr.css">
    <link rel="icon" href="https://dev.oseale.com/images/favicon.png?v=2" type="image/png">
    <meta charset="UTF-8">
    <title>Moderointi</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .msg {
          padding: 20px;
          border: 3px solid black;
          border-radius: 10px;
          background: white;
          white-space: pre-wrap;
          overflow-wrap: break-word;
          text-align: center;
          font-size: 2rem;
          font-family: Arial, Helvetica, sans-serif;
          color: black;
          display: inline-block;   /* important */
          width: auto;             /* natural width */
          max-width: 45vw;         /* prevents giant messages */
        }


        .meta {
            font-size: 0.85rem;
            color: #555;
            margin-bottom: 8px;
        }

        .text {
            white-space: pre-wrap;
            font-size: 1.1rem;
            overflow-wrap: anywhere;
            word-break: break-word;
        }

        .ldr {
            width: 100px;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;

            
            opacity: 1;
            visibility: visible;
            position: fixed !important;
        }

        .box {
            visibility: hidden; 
            width: calc(100vw - 40px);
            background: #fff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            text-align: center;
            max-width: 500px;
            border: 4px solid gray;
            z-index: 9999;
        }

        .footer {
            margin-top: 20px;
            font-size: 14px;
            color: #777;
        }

        .approve {
            background: #4CAF50;
            color: white;
            padding: 6px 12px;
            margin-right: 10px;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            font-size: 0.9rem;
        }

        .reject {
            background: #d9534f;
            color: white;
            padding: 6px 12px;
            margin-right: 10px;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            font-size: 0.9rem;
        }

        .back {
        width: 100%;
        height: 60px;
        padding: 12px;
        background-color: white;
        color: gray;
        font-family: Arial, Helvetica, sans-serif;
        font-size: 16px;
        cursor: pointer;
        transition: background 0.3s ease;
        margin-bottom: 8px;
        margin-top: 2px;
        border: 4px solid gray;
        border-radius: 8px;
        }

        .back:hover {
        background-color: #f5f5f5;
        }
    </style>
</head>

<body>

<div class="ldr" id="ldr">
    <svg class="hexagon" viewBox="0 0 50 50">
        <polygon points="10,25 17.5,12 32.5,12 40,25 32.5,38 17.5,38"></polygon>
    </svg>
    <svg class="ring" viewBox="0 0 50 50">
        <circle cx="25" cy="25" r="22"></circle>
    </svg>
</div>

<div class="box" id="box">
    <img src="https://dev.oseale.com/images/oseale-logo.png" width="100px" height="100px">
    <h1>Moderointi</h1>
    <div id="list">Ladataan...</div>
    <a href="https://t4.oseale.com/linktree.html"><button class="back">Takaisin</button></a>
    <div class="footer">&copy <span id="year"></span> Oseale.</div>
</div>

<script>
    let firstLoad = true;

    async function loadMessages() {
      const bigLoader = document.querySelector(".ldr");
      const smallLoader = document.querySelector(".ldr-right");
      const strip = document.getElementById("strip");
    
      if (firstLoad) {
        bigLoader.style.display = "flex";
        smallLoader.style.display = "none";
      } else {
        smallLoader.style.display = "flex";
      }
    
      const res = await fetch("https://script.google.com/macros/s/AKfycbwzozQyRx6f7Gl2g_osHnEMEtjbE3EY9CsEeJij0iw-_50H-ZUFcAUfbVM-cEqfaBsScQ/exec?d=get");
      const data = await res.json();
    
      strip.innerHTML = "";
    
      // Build vertical column
      const column = document.createElement("div");
      column.className = "column";
    
      data.approved.slice().reverse().forEach(row => {
        const div = document.createElement("div");
        div.className = "msg";
        div.textContent = row[0];
        column.appendChild(div);
      });
    
      strip.appendChild(column);
    
      // --- SLIDE-IN ANIMATION ---
      strip.style.animation = "none"; // prevent marquee from starting early
      strip.style.transition = "transform 0.8s ease";
      strip.style.transform = "translateX(-2vw)";
    
      requestAnimationFrame(() => {
        strip.style.transform = "translateX(0)";
      });
    
      // Start marquee AFTER slide-in finishes
      setTimeout(() => {
        startScroll();
      }, 850);
    
      if (firstLoad) {
        bigLoader.remove();
        firstLoad = false;
      }
    
      smallLoader.style.display = "none";
    }
    
    function startScroll() {
      const strip = document.getElementById("strip");
      const container = document.getElementById("message-container");
    
      const stripWidth = strip.scrollWidth;
      const containerWidth = container.clientWidth;
      const distance = stripWidth + containerWidth;
    
      const speed = 80;
      const duration = distance / speed;
    
      strip.style.animation = `scrollRight ${duration}s linear infinite`;
      strip.style.setProperty("--distance", `${distance}px`);
    }
    
    loadMessages();
    setInterval(loadMessages, 30000);

</script>

<script>
    const yearSpan = document.getElementById('year');
    if (yearSpan) yearSpan.textContent = new Date().getFullYear();
</script>

</body>
</html>
