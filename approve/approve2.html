<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Moderointi</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 900px;
      margin: 40px auto;
    }
    .msg {
      border: 1px solid #ccc;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 15px;
      background: #fafafa;
    }
    .meta {
      font-size: 0.85rem;
      color: #555;
      margin-bottom: 8px;
    }
    .text {
      white-space: pre-wrap;
      margin-bottom: 10px;
      font-size: 1.1rem;
    }
    button {
      padding: 6px 12px;
      margin-right: 10px;
      cursor: pointer;
      border: none;
      border-radius: 4px;
      font-size: 0.9rem;
    }
    .approve {
      background: #4CAF50;
      color: white;
    }
    .reject {
      background: #d9534f;
      color: white;
    }
  </style>
</head>

<body>

  <h1>Moderointi</h1>
  <div id="list">Ladataan...</div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyEGOD0jJF4eGtEF_m7eS6QpmsF6UYU0Fi3-QIR-vaB_abhRpGvhjWpW4FZFlbHUu44Ug/exec";

    async function loadPending() {
      const list = document.getElementById("list");
      list.textContent = "Ladataan...";

      try {
        const res = await fetch(`${SCRIPT_URL}?d=pending`);
        const data = await res.json();

        if (!data.pending || data.pending.length === 0) {
          list.textContent = "Ei odottavia viestejä.";
          return;
        }

        list.innerHTML = "";

        data.pending.forEach(item => {
          const box = document.createElement("div");
          box.className = "msg";

          box.innerHTML = `
            <div class="meta">Rivi: ${item.row} — ${item.timestamp}</div>
            <div class="text">${item.message}</div>
            <button class="approve" onclick="approve(${item.row})">Hyväksy</button>
            <button class="reject" onclick="reject(${item.row})">Hylkää</button>
          `;

          list.appendChild(box);
        });

      } catch (err) {
        list.textContent = "Virhe ladattaessa viestejä.";
      }
    }

    async function approve(row) {
      await fetch(`${SCRIPT_URL}?d=modify&row=${row}&col=2&value=Yes`);
      loadPending();
    }

    async function reject(row) {
      await fetch(`${SCRIPT_URL}?d=modify&row=${row}&col=2&value=Rejected`);
      loadPending();
    }

    loadPending();
  </script>

</body>
</html>
