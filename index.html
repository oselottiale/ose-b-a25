<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="https://dev.oseale.com/css/color-ldr.css">
  <style>
    body { background-color: white; margin: 0; overflow: hidden; }

    /* Loaders */
    .ldr, .ldr-right {
      position: fixed;
      width: 100px;
      height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    .ldr { top: 50%; left: 50%; transform: translate(-50%, -50%); }
    .ldr-right { bottom: 5px; right: 5px; display: none; }

    .hexagon, .ring {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
    }

    /* Header cards */
    .card, .card2 {
      display: flex;
      height: clamp(130px, 25vh, 180px);
      align-items: center;
      position: fixed;
      top: 0;
      background-color: white;
      z-index: 9999;
      border-bottom: 3px solid gray;
    }
    .card {
      width: clamp(525px, 40vw, 700px);
      right: 0;
      border-left: 3px solid gray;
      border-bottom-left-radius: 20px;
    }
    .card2 {
      width: clamp(425px, 40vw, 425px);
      left: 0;
      border-right: 3px solid gray;
      border-bottom-right-radius: 20px;
    }

    h1 { font-family: Arial, Helvetica, sans-serif; }

    .qr {
      height: calc(100% - 20px);
      margin: 10px;
      aspect-ratio: 1/1;
      flex-shrink: 0;
      margin-right: 8px;
    }

    .text-box, .text-box2 {
      flex: 1 1 auto;
      min-width: 0;
      display: flex;
      align-items: center;
    }
    .text-box2 { margin-left: 15px; }

    .text-box h1, .text-box2 h1 {
      margin: 0;
      white-space: normal;
      line-height: 1.1;
      font-size: clamp(1rem, 400%, 2.5rem);
    }

    /* Message viewport */
    #message-container {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100vw;
      height: calc(100vh - 225px);
      overflow: hidden;
      padding: 20px 0;
    }

    /* OUTER WRAPPER — slide-in only */
    #slide-wrapper {
      position: absolute;
      top: 0;
      left: 0;
      opacity: 0;
      transform: translateX(100vw);
      white-space: nowrap;
      will-change: transform;
    }

    /* INNER WRAPPER — marquee only */
    #marquee-wrapper {
      position: absolute;
      top: 0;
      left: 0;
      display: flex;
      flex-direction: row;
      gap: 80px;
      white-space: nowrap;
    }

    /* Column */
    .column {
      display: inline-flex;
      flex-direction: column;
      gap: 40px;
      white-space: normal;
    }

    /* Message styling */
    .msg {
      padding: 20px;
      border: 3px solid black;
      border-radius: 10px;
      background: white;
      white-space: pre-wrap;
      overflow-wrap: break-word;
      text-align: center;
      font-size: 2rem;
      font-family: Arial, Helvetica, sans-serif;
      color: black;
      display: inline-block;
      width: auto;
      max-width: 45vw;
    }
  </style>
</head>

<body>
  <div id="measure-wrapper" style="visibility:hidden; position:absolute; left:0; top:0;"></div>

  <div class="card">
    <img class="qr" src="https://t6.oseale.com/qr-code.png">
    <div class="text-box">
      <h1>Skannaa qr koodi lähettääksesi viesti aiheesta!</h1>
    </div>
  </div>

  <div class="card2">
    <div class="text-box2">
      <h1>Peltsiläisten viestit rasismin vastaisesta viikosta.</h1>
    </div>
  </div>

  <div class="ldr">
    <svg class="hexagon" viewBox="0 0 50 50">
      <polygon points="10,25 17.5,12 32.5,12 40,25 32.5,38 17.5,38"></polygon>
    </svg>
    <svg class="ring" viewBox="0 0 50 50">
      <circle cx="25" cy="25" r="22"></circle>
    </svg>
  </div>

  <div id="message-container">
    <div id="slide-wrapper">
      <div id="marquee-wrapper"></div>
    </div>
  </div>

  <div class="ldr-right">
    <svg class="hexagon" viewBox="0 0 50 50">
      <polygon points="10,25 17.5,12 32.5,12 40,25 32.5,38 17.5,38"></polygon>
    </svg>
    <svg class="ring" viewBox="0 0 50 50">
      <circle cx="25" cy="25" r="22"></circle>
    </svg>
  </div>

  <script>
let firstLoad = true;

let slideX = 0;
let slideSpeed = 0.6;   // slide-in speed (constant)
let marqueeX = 0;
let marqueeSpeed = 0.3; // marquee speed (constant)

let slidingIn = false;

async function loadMessages() {
  const bigLoader = document.querySelector(".ldr");
  const smallLoader = document.querySelector(".ldr-right");

  const slide = document.getElementById("slide-wrapper");
  const marquee = document.getElementById("marquee-wrapper");
  const container = document.getElementById("message-container");

  // NEW: hidden measurement wrapper
  let measure = document.getElementById("measure-wrapper");
  if (!measure) {
    measure = document.createElement("div");
    measure.id = "measure-wrapper";
    measure.style.visibility = "hidden";
    measure.style.position = "absolute";
    measure.style.left = "0";
    measure.style.top = "0";
    document.body.appendChild(measure);
  }

  if (firstLoad) {
    bigLoader.style.display = "flex";
  } else {
    smallLoader.style.display = "flex";
  }

  const res = await fetch("https://script.google.com/macros/s/.../exec?d=get");
  const data = await res.json();

  // Reset measurement wrapper
  measure.innerHTML = "";

  // Build columns INSIDE measurement wrapper
  let currentColumn = document.createElement("div");
  currentColumn.className = "column";
  measure.appendChild(currentColumn);

  let currentHeight = 0;
  const maxHeight = container.clientHeight;

  data.approved.slice().reverse().forEach(row => {
    const msg = document.createElement("div");
    msg.className = "msg";
    msg.textContent = row[0];

    // Temporarily append to measure to get height
    measure.appendChild(msg);
    const msgHeight = msg.offsetHeight + 40;
    measure.removeChild(msg);

    if (currentHeight + msgHeight > maxHeight) {
      currentColumn = document.createElement("div");
      currentColumn.className = "column";
      measure.appendChild(currentColumn);
      currentHeight = 0;
    }

    currentColumn.appendChild(msg);
    currentHeight += msgHeight;
  });

  // Now measurement wrapper contains the FINAL layout
  const contentHeight = measure.offsetHeight;
  const contentWidth = measure.scrollWidth;

  // Copy layout into real marquee wrapper
  marquee.innerHTML = measure.innerHTML;

  // Freeze height + padding (F2 + P1)
  slide.style.height = (contentHeight + 20) + "px";

  // Freeze width
  slide.style.width = contentWidth + "px";

  // Commit layout
  void slide.offsetWidth;

  // Start off-screen RIGHT
  const containerWidth = container.clientWidth;
  slideX = containerWidth;
  slide.style.left = slideX + "px";

  slide.style.opacity = "1";

  // Begin slide-in
  slidingIn = true;
  requestAnimationFrame(stepSlideIn);

  if (firstLoad) {
    bigLoader.remove();
    firstLoad = false;
  }

  smallLoader.style.display = "none";
}

function stepSlideIn() {
  const slide = document.getElementById("slide-wrapper");

  if (!slidingIn) return;

  slideX -= slideSpeed;

  if (slideX <= 0) {
    slideX = 0;
    slidingIn = false;
    requestAnimationFrame(stepMarquee);
  }

  slide.style.left = slideX + "px";
  requestAnimationFrame(stepSlideIn);
}

function stepMarquee() {
  const marquee = document.getElementById("marquee-wrapper");
  const container = document.getElementById("message-container");

  marqueeX -= marqueeSpeed;

  const totalWidth = marquee.scrollWidth;
  const containerWidth = container.clientWidth;

  if (marqueeX <= -totalWidth) {
    marqueeX = containerWidth;
  }

  marquee.style.left = marqueeX + "px";

  requestAnimationFrame(stepMarquee);
}

loadMessages();
setInterval(loadMessages, 30000);


  </script>

</body>
</html>
